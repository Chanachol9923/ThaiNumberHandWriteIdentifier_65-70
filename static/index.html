<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingus Handwriting ML (๖๕–๗๐)</title>
    <style>
        :root { --thai-orange: #e67e22; --thai-gold: #d4af37; --bg-dark: #1a1614; --card-bg: #2d2622; }
        body { font-family: sans-serif; background: var(--bg-dark); color: #fdf5e6; margin: 0; display: flex; flex-direction: column; align-items: center; }
        nav { width: 100%; background: rgba(45,38,34,0.95); padding: 1rem; display: flex; justify-content: center; gap: 20px; border-bottom: 4px solid var(--thai-orange); position: sticky; top: 0; z-index: 100; }
        nav button { padding: 10px 25px; font-size: 1rem; border: 2px solid var(--thai-gold); background: transparent; color: var(--thai-gold); cursor: pointer; font-weight: bold; border-radius: 8px; transition: 0.3s; }
        nav button.active { background: var(--thai-gold); color: var(--bg-dark); }
        .page { display: none; width: 90%; max-width: 800px; padding: 2rem; text-align: center; }
        .page.active { display: block; }
        .canvas-container { background: white; border: 5px solid var(--thai-gold); border-radius: 15px; display: inline-block; margin: 1rem 0; cursor: crosshair; touch-action: none; }
        canvas { display: block; }
        .btn-group { margin: 1rem 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        button { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--thai-orange); color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-warning { background: #f1c40f; color: black; }
        .btn-zip { background: #e74c3c; color: white; } /* สีแดงสำหรับปุ่ม ZIP */
        .console-box { background: #222222; color: rgb(255, 166, 0); padding: 15px; border-radius: 8px; text-align: left; height: 300px; overflow-y: auto; margin-top: 15px; font-size: 0.85rem; font-family: monospace; border: 2px solid #333; white-space: pre-wrap; }
        select, input[type="file"] { padding: 10px; border-radius: 5px; background: #3d342e; color: white; border: 1px solid var(--thai-gold); margin: 5px; }
        .status-text { font-size: 0.9rem; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>

<nav>
    <button onclick="showPage('predict')" id="nav-predict" class="active">PREDICT</button>
    <button onclick="showPage('collector')" id="nav-collector">COLLECTOR</button>
    <button onclick="showPage('admin')" id="nav-admin">ADMIN</button>
</nav>

<div id="predict" class="page active">
    <h1>Predict Thai Handwriting 65 - 70</h1>
    <div class="canvas-container"><canvas id="userCanvas" width="300" height="300"></canvas></div>
    <div style="font-size: 2.5rem; color: var(--thai-gold); margin: 10px 0;" id="predictionResult">Waiting...</div>
    <div id="activeModelLabel" class="status-text"></div>
    <div class="btn-group">
        <button style="background:#7f8c8d; color:white;" onclick="clearCanvas('userCanvas')">Clear</button>
        <button class="btn-primary" onclick="predict()">Predict</button>
    </div>
</div>

<div id="collector" class="page">
    <h1>Data Collector</h1>
    <select id="labelSelect" onchange="updateCount()">
        <option value="65">๖๕ (65)</option><option value="66">๖๖ (66)</option><option value="67">๖๗ (67)</option>
        <option value="68">๖๘ (68)</option><option value="69">๖๙ (69)</option><option value="70">๗๐ (70)</option>
    </select>
    <div>Images in system: <span id="count">0</span></div>
    <div class="canvas-container"><canvas id="collCanvas" width="300" height="300"></canvas></div>
    <div class="btn-group">
        <button style="background:#7f8c8d; color:white;" onclick="clearCanvas('collCanvas')">Clear</button>
        <button class="btn-success" onclick="saveSample()">Save Sample</button>
    </div>
    <hr style="border:0.5px solid #444; margin:2rem 0;">
    <div class="btn-group">
        <button class="btn-warning" onclick="startTrainingStream()">🚀 Start Training</button>
        <button class="btn-zip" onclick="window.location.href='/download-dataset'">📦 Download Dataset (ZIP)</button>
        <button class="btn-success" id="btnDownloadModel" onclick="window.location.href='/download-model'" style="display:none; background:#9b59b6;">💾 Download Model (.pkl)</button>
    </div>
    <div id="terminalContainer" style="display:none;"><div id="terminalOutput" class="console-box"></div></div>
</div>

<div id="admin" class="page">
    <h1>Admin Settings</h1>
    <div style="background:var(--card-bg); padding:1.5rem; border-radius:15px; border:1px solid var(--thai-orange); margin-bottom: 20px;">
        <h3>Switch Model</h3>
        <p>เลือกโมเดลที่เคยเทรนไว้แล้ว:</p>
        <select id="modelSelect" style="width: 80%;"></select><br><br>
        <button class="btn-success" onclick="switchModel()">Activate Selected Model</button>
    </div>
    <div style="background:var(--card-bg); padding:1.5rem; border-radius:15px; border:1px solid var(--thai-orange);">
        <h3>Upload .pkl File</h3>
        <input type="file" id="modelFile" accept=".pkl"><br><br>
        <button class="btn-primary" onclick="uploadModel()">Upload & Use</button>
        <div id="adminStatus" style="margin-top:15px; font-weight:bold;"></div>
    </div>
</div>

<script>
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('nav-' + id).classList.add('active');
        if(id === 'collector') updateCount();
        if(id === 'admin') loadModelList();
    }

    function setupCanvas(id) {
        const c = document.getElementById(id);
        const ctx = c.getContext('2d');
        let drawing = false;

        const getPos = (e) => {
            const rect = c.getBoundingClientRect();
            return {
                x: (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left,
                y: (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top
            };
        };

        const start = (e) => {
            drawing = true;
            // [จุดสำคัญที่ 2] ไม่สั่ง beginPath ที่นี่ที่เดียว ห
            // แต่ให้แน่ใจว่าทุกครั้งที่จิ้มใหม่ คือการเริ่มวาดใหม่จริงๆ
            ctx.beginPath(); 
            const p = getPos(e);
            ctx.moveTo(p.x, p.y);
        };

        const move = (e) => {
            if (!drawing) return;
            e.preventDefault();
            const p = getPos(e);
            ctx.lineWidth = 18;
            ctx.lineCap = 'round';
            ctx.strokeStyle = 'black';
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
        };

        const stop = () => {
            if (drawing) {
                ctx.closePath(); // ปิด Path ปัจจุบันให้เรียบร้อย
                drawing = false;
            }
        };

        c.addEventListener('mousedown', start);
        c.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);
        c.addEventListener('mouseleave', stop);
        c.addEventListener('touchstart', start);
        c.addEventListener('touchmove', move);
        c.addEventListener('touchend', stop);
    }

    function clearCanvas(id) { document.getElementById(id).getContext('2d').clearRect(0,0,300,300); }

        async function predict() {
        const canvas = document.getElementById('userCanvas');
        const ctx = canvas.getContext('2d');

        // [จุดสำคัญที่ 1] ตัดขาด Path เดิมก่อนส่งไป Predict 
        // เพื่อไม่ให้การวาดครั้งต่อไปมาเชื่อมกับเส้นเดิมในหน่วยความจำของ Canvas
        ctx.beginPath(); 

        const fd = new FormData();
        fd.append('image', canvas.toDataURL());
        
        const res = await fetch('/predict', { method:'POST', body:fd });
        const d = await res.json();
        
        // แสดงผลลัพธ์
        document.getElementById('predictionResult').innerText = `${d.prediction} (${d.conf}%)`;
        document.getElementById('activeModelLabel').innerText = `Current Model: ${d.model}`;
    }

    async function updateCount() {
        const res = await fetch(`/get-count/${document.getElementById('labelSelect').value}`);
        const data = await res.json(); document.getElementById('count').innerText = data.count;
    }

    async function saveSample() {
        const fd = new FormData(); fd.append('label', document.getElementById('labelSelect').value);
        fd.append('image', document.getElementById('collCanvas').toDataURL());
        await fetch('/save-sample', { method:'POST', body:fd }); clearCanvas('collCanvas'); updateCount();
    }

    function startTrainingStream() {
        const output = document.getElementById('terminalOutput');
        document.getElementById('terminalContainer').style.display = 'block';
        output.innerHTML = "Starting Training Script...\n";
        const eventSource = new EventSource('/train-stream');
        eventSource.onmessage = (e) => {
            if(e.data.includes("--- FINISHED ---")) {
                eventSource.close(); document.getElementById('btnDownloadModel').style.display='inline-block';
                output.innerHTML += "\n[SYSTEM]: Training Finished."; return;
            }
            output.innerHTML += e.data + "\n"; output.scrollTop = output.scrollHeight;
        };
    }

    async function loadModelList() {
        const res = await fetch('/list-models');
        const data = await res.json();
        const select = document.getElementById('modelSelect');
        select.innerHTML = '';
        data.models.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m;
            opt.innerText = m + (m === data.active ? " (Active)" : "");
            if(m === data.active) opt.selected = true;
            select.appendChild(opt);
        });
    }
    async function switchModel() {
        const name = document.getElementById('modelSelect').value;
        const fd = new FormData();
        fd.append('model_name', name);
        
        const res = await fetch('/select-model', { method:'POST', body:fd });
        const d = await res.json();
        
        if(d.status === "success") {
            // ล้างค่าเดิมในหน้า Predict ทันทีเพื่อให้มั่นใจว่าผลครั้งหน้าคือของใหม่
            document.getElementById('predictionResult').innerText = "Model Changed...";
            document.getElementById('activeModelLabel').innerText = "Active: " + name;
            alert("ระบบเปลี่ยนไปใช้โมเดล " + name + " เรียบร้อยแล้ว");
        }
    }

    async function uploadModel() {
        const file = document.getElementById('modelFile').files[0];
        if(!file) return alert("Select a file");
        const fd = new FormData(); fd.append('file', file);
        const res = await fetch('/update-model', { method:'POST', body:fd });
        const d = await res.json(); document.getElementById('adminStatus').innerText = d.status; loadModelList();
    }

    setupCanvas('userCanvas'); setupCanvas('collCanvas');
</script>
</body>
</html>
